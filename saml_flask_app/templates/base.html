<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SAML Flask App{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    header h1 { font-size: 1.3rem; letter-spacing: 0.5px; }
    header h1 span { color: #0f3460; background: #e94560; padding: 2px 8px; border-radius: 4px; margin-right: 8px; }

    nav a {
      color: #a8b2d8;
      text-decoration: none;
      margin-left: 1rem;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    nav a:hover { color: white; }

    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      color: #16213e;
      border-bottom: 2px solid #f0f2f5;
      padding-bottom: 0.6rem;
    }

    .btn {
      display: inline-block;
      padding: 0.55rem 1.3rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #0f3460; color: white; }
    .btn-primary:hover { background: #16213e; }
    .btn-danger  { background: #e94560; color: white; }
    .btn-danger:hover  { background: #c73652; }
    .btn-secondary { background: #f0f2f5; color: #16213e; border: 1px solid #dde; }
    .btn-secondary:hover { background: #e0e4ef; }

    .alert {
      padding: 0.9rem 1.2rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .alert-error   { background: #fff0f2; border-left: 4px solid #e94560; color: #c0173a; }
    .alert-success { background: #f0fff4; border-left: 4px solid #28a745; color: #155724; }
    .alert-info    { background: #f0f4ff; border-left: 4px solid #0f3460; color: #0f3460; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      padding: 0.65rem 1rem;
      text-align: left;
      border-bottom: 1px solid #f0f2f5;
    }
    th { background: #f8f9fc; font-weight: 600; color: #555; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      background: #e8eeff;
      color: #0f3460;
      font-size: 0.78rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin: 2px;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: #999;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>SAML</span> Flask Demo</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/attrs/">Attributes</a>
      <a href="/metadata/">Metadata</a>
      {% if paint_logout %}
      <a href="/?slo" style="color:#e94560;">Logout</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>SAML Flask Demo &mdash; python3-saml toolkit</footer>
</body>
</html>
